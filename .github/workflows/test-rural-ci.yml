name: Test rural-ci runner

on:
  workflow_dispatch:

jobs:
  test-runner:
    runs-on: [self-hosted, Linux, X64, rural-prod-deploy]

    steps:
      - name: Mostrar información del runner
        run: |
          echo "Runner operativo"
          hostname
          whoami
          uname -a

      - name: Comprobar conexión con producción
        run: |
          ssh rural-prod 'hostname && whoami'
