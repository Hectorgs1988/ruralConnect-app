version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: ruralconnect_mysql
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: ["--default-authentication-plugin=mysql_native_password",
              "--character-set-server=utf8mb4",
              "--collation-server=utf8mb4_unicode_ci"]

  adminer:
    image: adminer
    container_name: ruralconnect_adminer
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:8080"

  backend:
    build:
      context: ./Server
      dockerfile: Dockerfile
    container_name: ruralconnect_server
    restart: unless-stopped
    env_file:
      - ./Server/.env
    depends_on:
      - db
    ports:
      - "4000:4000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ruralconnect_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mysql_data:
